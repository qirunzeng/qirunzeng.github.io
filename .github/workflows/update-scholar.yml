name: Update Scholar Metrics

on:
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade requests beautifulsoup4

      - name: Refresh Scholar metrics
        run: python scripts/update_scholar.py

      - name: Commit updated metrics
        run: |
          if git diff --quiet -- _data/scholar.yml; then
            echo "No Scholar metric changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.yml
          git commit -m "Update Scholar metrics"
          git push
