profile:
  summary: "My work connects theoretical computer science, learning theory, online decision-making, approximation algorithms, and robust learning systems."
  cards:
    - title: "Academic Background"
      paragraphs:
        - "I am a Ph.D. student in computer science at City University of Hong Kong, advised by [Prof. Jinhang Zuo](https://jhzuo.github.io)."
        - "I received my bachelor's degree from the School of the Gifted Young at the University of Science and Technology of China in 2025, where I was advised by [Prof. Xue Chen](http://staff.ustc.edu.cn/~xuechen1989/) and [Prof. Jinhang Zuo](https://jhzuo.github.io)."
    - title: "Research Focus"
      paragraphs:
        - "My current research studies theoretical questions in sequential decision-making, especially bandit learning, hybrid feedback, robustness, and influence maximization."
      tags:
        - "Theory"
        - "Learning Theory"
        - "Bandit Learning"
        - "Hybrid Feedback"
        - "Influence Maximization"

research:
  summary: "I am interested in algorithms with provable guarantees for learning and decision-making under limited, noisy, or strategically distorted feedback."
  items:
    - title: "Bandit Learning and Hybrid Feedback"
      description: "Designing sample-efficient methods for stochastic bandits, best-arm identification, and generalized linear bandits with multiple feedback channels."
    - title: "Robust Online Learning"
      description: "Studying how online learning systems behave under adversarial behavior, fake data injection, and model uncertainty."
    - title: "Approximation Algorithms"
      description: "Developing memory-efficient approximation algorithms for influence maximization and related combinatorial optimization problems."

